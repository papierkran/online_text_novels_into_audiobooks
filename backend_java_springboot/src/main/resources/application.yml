spring:
  application:
    name: Text-to-Speech-backend

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/audio_novels?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false




server:
  port: 30600
